<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR-helper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      color: #1f2328;
      background: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      body {
        color: #e6edf3;
        background: #0d1117;
      }

      .header {
        border-bottom-color: #21262d;
      }

      .subtitle,
      .helper,
      .footer,
      .section-label {
        color: #8b949e;
      }

      .card {
        background: #161b22;
        border-color: #30363d;
      }

      label {
        color: #e6edf3;
      }

      input[type="password"] {
        background: #0d1117;
        border-color: #30363d;
        color: #e6edf3;
      }

      input[type="password"]:focus {
        border-color: #388bfd;
        box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.2);
      }

      .save-btn {
        background: #21262d;
        border-color: #30363d;
        color: #e6edf3;
      }

      .save-btn:hover {
        background: #30363d;
      }

      #status {
        background: #161b22;
        border-color: #30363d;
        color: #8b949e;
      }

      #status.success {
        background: rgba(35, 134, 54, 0.12);
        border-color: rgba(35, 134, 54, 0.4);
        color: #3fb950;
      }

      #status.error {
        background: rgba(248, 81, 73, 0.1);
        border-color: rgba(248, 81, 73, 0.35);
        color: #f85149;
      }
    }

    .header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid #d8dee4;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 12px;
      color: #656d76;
      margin-top: 2px;
    }

    .content {
      padding: 16px 18px 18px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #656d76;
      margin-bottom: 8px;
    }

    .card {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      border-radius: 8px;
      padding: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #1f2328;
    }

    .key-row {
      display: flex;
      gap: 8px;
    }

    input[type="password"] {
      flex: 1;
      min-width: 0;
      padding: 7px 10px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2328;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
    }

    .save-btn {
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2328;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease;
    }

    .save-btn:hover {
      background: #f3f4f6;
    }

    .helper {
      font-size: 11px;
      color: #656d76;
      margin-top: 8px;
    }

    .helper a {
      color: #0969da;
      text-decoration: none;
    }

    .helper a:hover {
      text-decoration: underline;
    }

    .actions {
      margin-top: 16px;
    }

    .generate-btn {
      width: 100%;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      background: #238636;
      border: 1px solid rgba(27, 31, 36, 0.15);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .generate-btn:hover:not(:disabled) {
      background: #2ea043;
    }

    .generate-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #status {
      margin-top: 12px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.45;
      min-height: 36px;
      border: 1px solid #d8dee4;
      border-radius: 6px;
      background: #f6f8fa;
      color: #656d76;
    }

    #status:empty {
      display: none;
    }

    #status.success {
      background: #dafbe1;
      border-color: #aceebb;
      color: #116329;
    }

    #status.error {
      background: #ffebe9;
      border-color: #ffcecb;
      color: #cf222e;
    }

    .footer {
      padding: 0 18px 14px;
      font-size: 11px;
      color: #8b949e;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>PR-helper</h1>
    <p class="subtitle">Generate pull request titles and descriptions from your diff</p>
  </header>

  <div class="content">
    <p class="section-label">Configuration</p>
    <div class="card">
      <label for="apiKey">Groq API key</label>
      <div class="key-row">
        <input type="password" id="apiKey" placeholder="gsk_..." autocomplete="off" spellcheck="false" />
        <button type="button" class="save-btn" id="saveBtn">Save</button>
      </div>
      <p class="helper">Get a free key at <a href="https://console.groq.com" target="_blank" rel="noopener">console.groq.com</a></p>
    </div>

    <div class="actions">
      <button type="button" class="generate-btn" id="generateBtn">Generate PR description</button>
      <div id="status" role="status" aria-live="polite"></div>
    </div>
  </div>

  <p class="footer">PR-helper</p>

  <script src="popup.js"></script>
</body>
</html>
