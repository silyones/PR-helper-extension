<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR-helper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      color: #c9d1d9;
      background: #0d1117;
    }

    .container {
      padding: 16px;
    }

    .header {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #21262d;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0f6fc;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #c9d1d9;
    }

    .key-row {
      display: flex;
      gap: 8px;
    }

    input[type="password"] {
      flex: 1;
      min-width: 0;
      padding: 7px 10px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #0d1117;
      color: #c9d1d9;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #388bfd;
      box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.2);
    }

    input[type="password"].saved {
      border-color: #238636;
      box-shadow: 0 0 0 3px rgba(35, 134, 54, 0.25);
    }

    .save-btn {
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      white-space: nowrap;
    }

    .save-btn:hover {
      background: #30363d;
    }

    .helper {
      font-size: 11px;
      color: #8b949e;
      margin-top: 8px;
    }

    .helper a {
      color: #58a6ff;
      text-decoration: none;
    }

    .helper a:hover {
      text-decoration: underline;
    }

    .generate-btn {
      width: 100%;
      margin-top: 16px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      background: #238636;
      border: 1px solid rgba(27, 31, 36, 0.15);
      border-radius: 6px;
      cursor: pointer;
    }

    .generate-btn:hover:not(:disabled) {
      background: #2ea043;
    }

    .generate-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.45;
      color: #8b949e;
      min-height: 18px;
    }

    #status:empty {
      display: none;
    }

    #status.success {
      color: #3fb950;
    }

    #status.error {
      color: #f85149;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>PR-helper</h1>
    </header>

    <label for="apiKey">Groq API key</label>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="gsk_..." autocomplete="off" spellcheck="false" />
      <button type="button" class="save-btn" id="saveBtn">Save</button>
    </div>
    <p class="helper">Get a free key at <a href="https://console.groq.com" target="_blank" rel="noopener">console.groq.com</a></p>

    <button type="button" class="generate-btn" id="generateBtn">Generate PR description</button>
    <div id="status" role="status" aria-live="polite"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
